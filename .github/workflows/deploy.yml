name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-makazicloud-vps
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Strip stray CR — CRLF line endings make OpenSSL reject the key
          # with "error in libcrypto".
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          if ! ssh-keygen -y -f ~/.ssh/vps_deploy_key > /dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY is not a valid OpenSSH private key."
            echo "Re-add the secret as the full multi-line key starting with"
            echo "'-----BEGIN OPENSSH PRIVATE KEY-----' (or '-----BEGIN RSA PRIVATE KEY-----'),"
            echo "with newlines preserved. PuTTY .ppk format must be converted first via 'puttygen'."
            exit 1
          fi
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to VPS
        shell: bash
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/vps_deploy_key" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "apps/*/node_modules/" \
            --exclude "apps/api/dist/" \
            --exclude "apps/web/build/" \
            --exclude "apps/web/.react-router/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude ".deploy-db-password" \
            --exclude ".DS_Store" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"

      - name: Deploy on VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/vps_deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd '${{ secrets.VPS_APP_DIR }}' && bash scripts/deploy-production.sh"
