# Mirror of the live config at /etc/nginx/sites-available/makazicloud.conf on the VPS.
# SSL block was added by `sudo certbot --nginx`; keep the "# managed by Certbot"
# markers so certbot can update them on renewal. Safe to `cp` over the live file.

server {
    server_name makazicloud.com www.makazicloud.com;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:4100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/makazicloud.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/makazicloud.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.makazicloud.com) { return 301 https://$host$request_uri; } # managed by Certbot
    if ($host = makazicloud.com)     { return 301 https://$host$request_uri; } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name makazicloud.com www.makazicloud.com;
    return 404; # managed by Certbot
}
